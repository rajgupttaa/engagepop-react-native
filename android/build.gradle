apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"

android {
    namespace "com.engagepop.reactnative"
    compileSdkVersion 34

    defaultConfig {
        minSdkVersion 21
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation "com.facebook.react:react-android"
    // The native Android SDK does the real work.
    implementation "com.engagepop:engagepop-android:0.2.1"
}
